description: >
  Dr Mukhlid Yousif is a Researcher, and Senior Genomics and Public Health Scientist with over 15 years of experience in molecular virology, bioinformatics, and genomic epidemiology. His research spans hepatitis B virus, HIV drug resistance, measles, rubella, and polio. He co-established the Wastewater Genomics Syndicate at the National Institute for Communicable Diseases (NICD) in South Africa, leading the development and implementation of multi-pathogen wastewater surveillance to inform public health responses. Dr Yousif has led international collaborations and consortia, received multiple grants, published over 20 peer-reviewed articles, supervised postgraduate students, and works closely with regional and global partners to strengthen diseases surveillance using wastewater across Africa.
