description: >
  Kathleen O’Reilly is an Associate Professor in statistics for infectious diseases at the London School of Hygiene and Tropical Medicine. Dr O’Reilly is the co-Director of the internationally recognised Centre for Mathematical Modelling of Infectious Diseases (LSHTM). Her research interests are in the use of data analytics to prevent outbreaks and solve challenges in epidemiology. The research team at LSHTM are modelling partners for Unicef in the Global Polio Eradication Initiative, where analysis and modelling are used to support polio eradication challenges and inform policy. Activities in environmental and wastewater surveillance have stemmed from its use in polio eradication, and during the COVID-19 pandemic several projects were established to better understand SARS-CoV-2 spread from wastewater. In the METSI-PH consortia Kath is supporting the research of several group members, including PhD and MSc supervision. Additionally, Kath will develop research in how vale of information methods can be used to evaluate wastewater data.